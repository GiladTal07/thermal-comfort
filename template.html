<!DOCTYPE html>
<html>
<head>
<style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; color: #2c3e50; }
    h2 { color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 6px; }
    h3 { color: #34495e; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    td, th { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background-color: #f2f2f2; font-weight: bold; }
    tr:nth-child(even) { background-color: #fafafa; }
    strong { color: #1a252f; }
    ul, ol { padding-left: 20px; }
    li { margin: 4px 0; }
    hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    .img-block { margin: 20px 0; }
    .img-block img { max-width: 100%; border-radius: 4px; }
    .img-label { font-size: 0.85em; color: #666; margin-top: 4px; }
</style>
</head>
<body>
{content}
{images}
</body>
</html>
